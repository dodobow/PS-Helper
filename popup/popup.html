<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../common.css">
        <link rel="stylesheet" href="popup.css">
    </head>
    <body class="popup-body">
        <div class="popup-header">
            <img src="../assets/algoIcon128.png" alt="Algosaurus Logo" class="popup-logo-img">
            <h1>알고사우루스</h1>
            <button id="settingBtn" class="dashboard-badge">My Page</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="solvedId" placeholder="백준 핸들 입력">
            <button id="loginBtn">조회</button>
        </div>

        <div id="result">
            아이디를 입력하고<br>티어를 확인해보세요!
        </div>
        
        <div id="recommend-section" class="recommend-box" style="display: none;">
            <div class="btn-group">
                <button id="recommendBtn">목표 맞춤 🎲</button>
                <button id="weakRecommendBtn" class="weak-btn">약점 보충 🔥</button>
            </div>
            <div id="problem-view" class="problem-view-box"></div>
        </div>
        
        <script src="../utils.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
